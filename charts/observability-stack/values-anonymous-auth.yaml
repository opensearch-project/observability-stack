# Anonymous Authentication overlay for Observability Stack Helm chart.
#
# Usage:
#   helm install obs-stack . -f values-anonymous-auth.yaml
#   helm upgrade obs-stack . -f values-anonymous-auth.yaml
#
# This enables read-only anonymous access to OpenSearch Dashboards — users can
# browse data, explore traces, and run queries without logging in. They cannot
# modify saved objects or perform admin operations.
#
# IMPORTANT: If toggling on an existing deployment, you must delete the
# OpenSearch StatefulSet PVCs to force security config reinitialization:
#   helm uninstall obs-stack
#   kubectl delete pvc -l app.kubernetes.io/instance=obs-stack
#   helm install obs-stack . -f values-anonymous-auth.yaml

anonymousAuth:
  enabled: true

# OpenSearch — enable anonymous auth in the security plugin
opensearch:
  securityConfig:
    config:
      dataComplete: false
      data:
        config.yml: |-
          _meta:
            type: "config"
            config_version: 2
          config:
            dynamic:
              http:
                anonymous_auth_enabled: true
                xff:
                  enabled: false
                  internalProxies: "192\\.168\\.0\\.10|192\\.168\\.0\\.11"
              authc:
                basic_internal_auth_domain:
                  description: "Authenticate via HTTP Basic against internal users database"
                  http_enabled: true
                  transport_enabled: true
                  order: 4
                  http_authenticator:
                    type: "basic"
                    challenge: true
                  authentication_backend:
                    type: "intern"
        roles.yml: |-
          _meta:
            type: "roles"
            config_version: 2
          opendistro_security_anonymous_role:
            reserved: false
            cluster_permissions:
              - "cluster:monitor/state"
              - "cluster:monitor/health"
              - "cluster:monitor/nodes/info"
              - "cluster:monitor/main"
              - "indices:data/read/scroll*"
              - "cluster:admin/opensearch/ppl"
              - "cluster:admin/opensearch/sql"
              - "cluster:admin/opensearch/ql/datasources/read"
              - "cluster:admin/opensearch/ql/async_query/read"
              - "cluster:admin/opensearch/direct_query/read/query"
              - "cluster:admin/opendistro/ism/policy/search"
              - "cluster:admin/opendistro/ism/policy/get"
              - "cluster:admin/opendistro/ism/managedindex/explain"
              - "cluster:admin/opendistro/rollup/search"
              - "cluster:admin/opendistro/rollup/get"
              - "cluster:admin/opendistro/rollup/explain"
              - "cluster:admin/opendistro/transform/get_transforms"
              - "cluster:admin/opendistro/transform/get"
              - "cluster:admin/opendistro/transform/explain"
              - "cluster:admin/opensearch/securityanalytics/rule/search"
              - "cluster:admin/opensearch/securityanalytics/detector/search"
              - "cluster:admin/opensearch/securityanalytics/findings/get"
              - "cluster:admin/opensearch/securityanalytics/alerts/get"
              - "cluster:admin/opensearch/securityanalytics/detector/get"
              - "cluster:admin/opensearch/securityanalytics/logtype/search"
              - "cluster:admin/opensearch/ml/connectors/search"
              - "cluster:admin/opensearch/ml/predict"
              - "indices:data/read/mget"
              - "indices:data/read/mget*"
            index_permissions:
              - index_patterns:
                  - ".kibana"
                  - ".kibana-6"
                  - ".kibana_*"
                  - ".opensearch_dashboards"
                  - ".opensearch_dashboards-6"
                  - ".opensearch_dashboards_*"
                allowed_actions:
                  - "read"
                  - "indices:data/read*"
                  - "indices:data/read/mget"
                  - "indices:data/read/mget*"
                  - "indices:admin/mappings/fields/get*"
                  - "indices:admin/resolve/index"
              - index_patterns:
                  - ".tasks"
                  - ".management-beats"
                  - "*:.tasks"
                  - "*:.management-beats"
                allowed_actions:
                  - "read"
              - index_patterns:
                  - "opensearch_dashboards_sample_data_logs"
                  - "opensearch_dashboards_sample_data_flights"
                  - "opensearch_dashboards_sample_data_ecommerce"
                allowed_actions:
                  - "read"
              - index_patterns:
                  - '*'
                allowed_actions:
                  - "read"
                  - "indices:data/read/*"
                  - "indices:data/read/mget"
                  - "indices:data/read/mget*"
                  - "indices:data/read/search"
                  - "indices:data/read/search*"
                  - "indices:admin/get"
                  - "indices:admin/exists"
                  - "indices:admin/resolve/index"
                  - "indices:admin/aliases/exists*"
                  - "indices:admin/aliases/get*"
                  - "indices:admin/mappings/get"
                  - "indices:monitor/settings/get"
                  - "indices:monitor/stats"
            tenant_permissions:
              - tenant_patterns:
                  - '*'
                allowed_actions:
                  - "kibana_all_read"
        roles_mapping.yml: |-
          _meta:
            type: "rolesmapping"
            config_version: 2
          opendistro_security_anonymous_role:
            backend_roles:
              - "opendistro_security_anonymous_backendrole"
          all_access:
            reserved: true
            backend_roles:
              - "admin"
            description: "Maps admin to all_access"
          kibana_server:
            reserved: true
            users:
              - "kibanaserver"
            description: "Maps kibana_server role to kibanaserver user"

# OpenSearch Dashboards — enable anonymous login and disable saved-object
# permission checks (required so anonymous users can access workspaces
# created by the init script; OSD doesn't support per-workspace permission
# grants via the API).
#
# Credentials are NOT set here — the sub-chart injects them automatically
# from opensearchAccount.secret (the opensearch-credentials K8s Secret).
opensearch-dashboards:
  config:
    opensearch_dashboards.yml: |
      server.host: "0.0.0.0"
      server.name: "observability-stack-dashboards"
      opensearch.hosts: ["https://opensearch-cluster-master:9200"]
      opensearch.ssl.verificationMode: none
      opensearch.requestTimeout: 30000
      opensearch.requestHeadersAllowlist: ["authorization", "securitytenant"]
      opensearch_security.auth.anonymous_auth_enabled: true
      opensearch_security.multitenancy.enabled: false
      savedObjects.permission.enabled: false
      opensearch_security.readonly_mode.roles: ["kibana_read_only"]
      console.enabled: true
      server.maxPayloadBytes: 1048576
      savedObjects.maxImportPayloadBytes: 26214400
      csp.strict: false
      explore.enabled: true
      explore.discoverTraces.enabled: true
      explore.discoverMetrics.enabled: true
      explore.agentTraces.enabled: true
      workspace.enabled: true
      data_source.enabled: true
      data_source.ssl.verificationMode: none
      datasetManagement.enabled: true
      data.savedQueriesNewUI.enabled: true
      opensearchDashboards.branding.useExpandedHeader: false
      uiSettings.overrides.home:useNewHomePage: true
      uiSettings.overrides.query:enhancements:enabled: true
      uiSettings.overrides.explore:experimental: true

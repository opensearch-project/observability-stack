suite: opensearch credentials secret
templates:
  - templates/opensearch-credentials-secret.yaml
tests:
  - it: should render with default credentials
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: stringData.username
          value: admin
      - equal:
          path: stringData.password
          value: "My_password_123!@#"

  - it: should use custom credentials
    set:
      opensearchUsername: myuser
      opensearchPassword: "S3cret!"
    asserts:
      - equal:
          path: stringData.username
          value: myuser
      - equal:
          path: stringData.password
          value: "S3cret!"

  - it: should include standard labels
    asserts:
      - exists:
          path: metadata.labels["helm.sh/chart"]
      - exists:
          path: metadata.labels["app.kubernetes.io/managed-by"]

  - it: should use fixed secret name
    asserts:
      - equal:
          path: metadata.name
          value: opensearch-credentials

  - it: should include cookie key
    asserts:
      - exists:
          path: stringData.cookie

  - it: should include OPENSEARCH_INITIAL_ADMIN_PASSWORD key
    asserts:
      - equal:
          path: stringData.OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: "My_password_123!@#"

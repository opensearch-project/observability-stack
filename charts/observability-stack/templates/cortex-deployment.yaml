{{- if .Values.cortex.enabled }}
# Cortex runs in single-binary mode and serves as a drop-in Prometheus
# replacement with Ruler + Alertmanager integration. The Service is named
# `-prometheus-server` so the existing `PROMETHEUS_HOST/_PORT` wiring
# (otel-collector, data-prepper, init-dashboards) keeps working.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "observability-stack.fullname" . }}-cortex
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: cortex
spec:
  replicas: 1
  # Cortex single-binary holds the TSDB on a RWO volume — recreate rather
  # than rolling so the new pod can claim the PVC without racing the old.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: cortex
  template:
    metadata:
      labels:
        app.kubernetes.io/component: cortex
    spec:
      # First-boot cleanup: pre-PR installs wrote vanilla-Prometheus TSDB
      # layout (chunks_head/, wal/, wbl/, lock, queries.active) directly
      # under /data. Cortex writes its own layout (/data/tsdb, /data/blocks,
      # /data/ruler-storage) alongside those, so the stale dirs must go
      # before Cortex starts. Gate: /data/tsdb absent AND /data/chunks_head
      # present → the upgrade case; otherwise this is a no-op.
      initContainers:
        - name: cleanup-legacy-prometheus
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -d /data/tsdb ] && [ -d /data/chunks_head ]; then
                echo "Cleaning legacy Prometheus TSDB dirs under /data"
                rm -rf /data/chunks_head /data/wal /data/wbl /data/lock /data/queries.active
              fi
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: cortex
          image: "{{ .Values.cortex.image.repository }}:{{ .Values.cortex.image.tag }}"
          imagePullPolicy: {{ .Values.cortex.image.pullPolicy | default "IfNotPresent" }}
          args:
            - -config.file=/etc/cortex/cortex.yaml
            - -compactor.blocks-retention-period={{ .Values.cortex.retention }}
          ports:
            - name: http
              containerPort: 9090
            - name: grpc
              containerPort: 9095
          readinessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /ready
              port: 9090
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.cortex.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/cortex
            - name: data
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: {{ include "observability-stack.fullname" . }}-cortex-config
        - name: data
          {{- if .Values.cortex.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "observability-stack.fullname" . }}-cortex-data
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}

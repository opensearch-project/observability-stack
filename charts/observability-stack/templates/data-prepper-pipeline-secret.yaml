{{- if index .Values "data-prepper" "enabled" }}
{{- $opensearchHost := printf "https://%s:9200" (.Values.opensearchServiceName | default "opensearch-cluster-master") -}}
apiVersion: v1
kind: Secret
metadata:
  name: data-prepper-pipeline
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  pipelines.yaml: |
    otlp-pipeline:
      delay: 10
      source:
        otlp:
          port: 21890
          ssl: false
      route:
        - logs: 'getEventType() == "LOG"'
        - traces: 'getEventType() == "TRACE"'
      sink:
        - pipeline:
            name: "otel-logs-pipeline"
            routes: ["logs"]
        - pipeline:
            name: "otel-traces-pipeline"
            routes: ["traces"]

    otel-logs-pipeline:
      workers: 5
      delay: 10
      source:
        pipeline:
          name: "otlp-pipeline"
      buffer:
        bounded_blocking: {}
      processor:
        - copy_values:
            entries:
              - from_key: "time"
                to_key: "@timestamp"
      sink:
        - opensearch:
            hosts: [{{ $opensearchHost | quote }}]
            username: {{ .Values.opensearchUsername | quote }}
            password: {{ .Values.opensearchPassword | quote }}
            insecure: true
            index_type: log-analytics-plain

    otel-traces-pipeline:
      delay: 100
      source:
        pipeline:
          name: "otlp-pipeline"
      sink:
        - pipeline:
            name: "traces-raw-pipeline"
        - pipeline:
            name: "service-map-pipeline"

    traces-raw-pipeline:
      source:
        pipeline:
          name: "otel-traces-pipeline"
      processor:
        - otel_traces: {}
      sink:
        - opensearch:
            hosts: [{{ $opensearchHost | quote }}]
            username: {{ .Values.opensearchUsername | quote }}
            password: {{ .Values.opensearchPassword | quote }}
            insecure: true
            index_type: trace-analytics-plain-raw

    service-map-pipeline:
      delay: 100
      source:
        pipeline:
          name: "otel-traces-pipeline"
      processor:
        - otel_apm_service_map:
            group_by_attributes: [telemetry.sdk.language]
            window_duration: 10s
      route:
        - otel_apm_service_map_route: 'getEventType() == "SERVICE_MAP"'
        - service_processed_metrics: 'getEventType() == "METRIC"'
      sink:
        - opensearch:
            hosts: [{{ $opensearchHost | quote }}]
            username: {{ .Values.opensearchUsername | quote }}
            password: {{ .Values.opensearchPassword | quote }}
            index_type: otel-v2-apm-service-map
            routes: [otel_apm_service_map_route]
            insecure: true
        # Fan out service-derived RED metrics to a dedicated pipeline that
        # strips the per-event randomKey UUID before Cortex rejects it for
        # cardinality. Don't drop telemetry.sdk.language — the service_map
        # processor groups by it and collapsing collides multi-language
        # services onto the same (series, timestamp) tuple.
        - pipeline:
            name: "service-metrics-cortex-pipeline"
            routes: [service_processed_metrics]

    # Strips the per-event `randomKey` UUID before Cortex remote-write.
    # Data-prepper event keys use JSON-pointer paths; the otel_apm_service_map
    # processor writes them under /attributes/<key>, so both paths are listed.
    service-metrics-cortex-pipeline:
      delay: 100
      source:
        pipeline:
          name: "service-map-pipeline"
      processor:
        - delete_entries:
            with_keys:
              - "/attributes/randomKey"
              - "randomKey"
      sink:
        - prometheus:
            url: "http://{{ .Release.Name }}-prometheus-server:80/api/v1/push"
            insecure: true
            threshold:
              max_events: 500
              flush_interval: 5s
{{- end }}

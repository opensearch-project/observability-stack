{{- if .Values.cortex.enabled }}
# One-shot helm hook that loads rule groups into Cortex via the Ruler API.
# Runs post-install + post-upgrade so rule edits land without a Cortex
# restart. Script path: /scripts/init-cortex-rules.py, rules mounted at
# /rules/<namespace>/ to match the compose-side layout.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability-stack.fullname" . }}-cortex-rules-init-script
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: cortex
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "6"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  init-cortex-rules.py: |
{{ .Files.Get "files/init-cortex-rules.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "observability-stack.fullname" . }}-cortex-rules-init
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: cortex
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cortex-rules-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: cortex-rules-init
          image: python:3.11-alpine
          command:
            - /bin/sh
            - -c
            - |
              pip install -q requests pyyaml && python /scripts/init-cortex-rules.py
          env:
            - name: CORTEX_URL
              value: "http://{{ .Release.Name }}-prometheus-server:80"
          volumeMounts:
            - name: script
              mountPath: /scripts
            - name: rules-stack
              mountPath: /rules/stack
            {{- if index .Values "opentelemetry-demo" "enabled" }}
            - name: rules-otel-demo
              mountPath: /rules/otel_demo
            {{- end }}
      volumes:
        - name: script
          configMap:
            name: {{ include "observability-stack.fullname" . }}-cortex-rules-init-script
        - name: rules-stack
          configMap:
            name: {{ include "observability-stack.fullname" . }}-cortex-rules-stack
        {{- if index .Values "opentelemetry-demo" "enabled" }}
        - name: rules-otel-demo
          configMap:
            name: {{ include "observability-stack.fullname" . }}-cortex-rules-otel-demo
        {{- end }}
{{- end }}

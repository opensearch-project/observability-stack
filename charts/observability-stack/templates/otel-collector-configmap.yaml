{{- if index .Values "opentelemetry-collector" "enabled" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
data:
  relay: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
      # Self-scrape pulls the collector's own otelcol_* metrics from the
      # :8888 Prometheus endpoint (see service.telemetry below) so they
      # land in Cortex. The base-stack alerts (OtelCollectorExportFailures,
      # OtelCollectorHighMemory, OtelCollectorQueueNearCapacity,
      # PrometheusTargetDown) depend on this.
      prometheus/self:
        config:
          scrape_configs:
            - job_name: otel-collector
              scrape_interval: 15s
              static_configs:
                - targets: ["localhost:8888"]
              relabel_configs:
                - target_label: service.name
                  replacement: otel-collector
      # Scrape envoy's /stats/prometheus for ingress-level RED visibility
      # when the otel-demo overlay is running. Harmless no-op otherwise —
      # DNS resolution for frontend-proxy just fails and the scrape drops.
      #
      # Hostname `frontend-proxy` is bare (not release-prefixed) because the
      # opentelemetry-demo subchart names every component Service after the
      # bare component name. If a user enables that subchart with a
      # `nameOverride` or otherwise rewires its Service naming, this scrape
      # silently no-ops (DNS NXDOMAIN — same fallback as when the subchart
      # is disabled).
      prometheus/envoy:
        config:
          scrape_configs:
            - job_name: envoy-frontend-proxy
              scrape_interval: 15s
              metrics_path: /stats/prometheus
              static_configs:
                - targets: ["frontend-proxy:10000"]
              relabel_configs:
                - target_label: service.name
                  replacement: frontend-proxy
      # OpenSearch exporter metrics for the OS Cluster Health dashboard.
      prometheus/opensearch-exporter:
        config:
          scrape_configs:
            - job_name: opensearch-exporter
              scrape_interval: 15s
              static_configs:
                - targets: ["{{ include "observability-stack.fullname" . }}-opensearch-exporter:9114"]
              relabel_configs:
                - target_label: service.name
                  replacement: opensearch-exporter
      # Cortex internal metrics for the Pipeline Health dashboard.
      prometheus/cortex:
        config:
          scrape_configs:
            - job_name: cortex
              scrape_interval: 15s
              metrics_path: /metrics
              static_configs:
                - targets: ["{{ .Release.Name }}-prometheus-server:80"]
              relabel_configs:
                - target_label: service.name
                  replacement: cortex
      # Data Prepper pipeline metrics for the Pipeline Health dashboard.
      prometheus/data-prepper:
        config:
          scrape_configs:
            - job_name: data-prepper
              scrape_interval: 15s
              metrics_path: /metrics/sys
              static_configs:
                - targets: ["{{ .Release.Name }}-data-prepper-metrics:4900"]
              relabel_configs:
                - target_label: service.name
                  replacement: data-prepper
            - job_name: data-prepper-pipelines
              scrape_interval: 15s
              metrics_path: /metrics/prometheus
              static_configs:
                - targets: ["{{ .Release.Name }}-data-prepper-metrics:4900"]
              relabel_configs:
                - target_label: service.name
                  replacement: data-prepper
      # Kubernetes metrics — harmless no-op if kube-state-metrics / node-exporter
      # are not installed (DNS NXDOMAIN → scrape drops silently).
      prometheus/kube-state-metrics:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: 15s
              static_configs:
                - targets: ["kube-state-metrics.kube-system.svc.cluster.local:8080"]
              relabel_configs:
                - target_label: service.name
                  replacement: kube-state-metrics
      prometheus/node-exporter:
        config:
          scrape_configs:
            - job_name: node-exporter
              scrape_interval: 15s
              static_configs:
                - targets: ["node-exporter-prometheus-node-exporter.kube-system.svc.cluster.local:9100"]
              relabel_configs:
                - target_label: service.name
                  replacement: node-exporter
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 10s
        send_batch_size: 1024
      resourcedetection:
        detectors: [env, system]
      # Normalizes non-OTel GenAI span attributes (OpenInference, OpenLLMetry)
      # into OTel GenAI semantic conventions. Traces only. Runs before the
      # transform de-dotting so downstream conflict handling sees gen_ai.* keys.
      gen_ai_normalizer:
        sources:
          - name: openinference
            remove_originals: true
          - name: openllmetry
            remove_originals: true
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - replace_pattern(name, "\\?.*", "")
              - replace_match(name, "GET /api/products/*", "GET /api/products/{productId}")
              # Workaround for https://github.com/opensearch-project/data-prepper/issues/5616
              # Flatten nested dotted attribute keys to prevent OpenSearch mapping conflicts
              - set(attributes["db_system_name"], attributes["db.system.name"]) where attributes["db.system.name"] != nil
              - delete_key(attributes, "db.system.name")
              - set(attributes["code_function_name"], attributes["code.function.name"]) where attributes["code.function.name"] != nil
              - delete_key(attributes, "code.function.name")
              - set(attributes["user_agent_original"], attributes["user_agent.original"]) where attributes["user_agent.original"] != nil
              - delete_key(attributes, "user_agent.original")
              - set(attributes["upstream_cluster_name"], attributes["upstream_cluster.name"]) where attributes["upstream_cluster.name"] != nil
              - delete_key(attributes, "upstream_cluster.name")
              - set(attributes["error_type"], attributes["error.type"]) where attributes["error.type"] != nil
              - delete_key(attributes, "error.type")
              - set(attributes["app_ads_contextKeys"], attributes["app.ads.contextKeys"]) where attributes["app.ads.contextKeys"] != nil
              - delete_key(attributes, "app.ads.contextKeys")
              - set(attributes["rpc_system"], attributes["rpc.system"]) where attributes["rpc.system"] != nil
              - delete_key(attributes, "rpc.system")
              # Rename flat-string attributes that conflict with dotted-key object mappings
              - set(attributes["user_agent_string"], attributes["user_agent"]) where attributes["user_agent"] != nil and not IsMap(attributes["user_agent"])
              - delete_key(attributes, "user_agent") where attributes["user_agent_string"] != nil
              - set(attributes["db_system"], attributes["db.system"]) where attributes["db.system"] != nil
              - delete_key(attributes, "db.system")
          - context: spanevent
            statements:
              - set(attributes["message_type"], attributes["message.type"]) where attributes["message.type"] != nil
              - delete_key(attributes, "message.type")
              - set(attributes["message_id"], attributes["message.id"]) where attributes["message.id"] != nil
              - delete_key(attributes, "message.id")
              - set(attributes["message_uncompressed_size"], attributes["message.uncompressed_size"]) where attributes["message.uncompressed_size"] != nil
              - delete_key(attributes, "message.uncompressed_size")
        log_statements:
          - context: log
            statements:
              - flatten(body) where IsMap(body)
              - set(body, ToKeyValueString(body)) where IsMap(body)
    exporters:
      debug:
        # basic logs per-batch counts only. detailed serializes every span/log/
        # metric to stdout, which throttles the pipeline at high throughput
        # (observed ~6x slower trace ingest).
        verbosity: basic
      otlp/opensearch:
        endpoint: "{{ .Release.Name }}-data-prepper:21890"
        tls:
          insecure: true
          insecure_skip_verify: true
      # Cortex remote-write sink. resource_to_telemetry_conversion promotes
      # OTel resource attributes (service.name, service.version, …) onto
      # every sample so Cortex-side series carry `service_name` labels.
      prometheusremotewrite/cortex:
        endpoint: "http://{{ .Release.Name }}-prometheus-server:80/api/v1/push"
        tls:
          insecure: true
        resource_to_telemetry_conversion:
          enabled: true
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: info
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: "0.0.0.0"
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resourcedetection, memory_limiter, gen_ai_normalizer, transform, batch]
          exporters: [otlp/opensearch, debug]
        metrics:
          receivers: [otlp, prometheus/self, prometheus/envoy, prometheus/opensearch-exporter, prometheus/cortex, prometheus/data-prepper, prometheus/kube-state-metrics, prometheus/node-exporter]
          processors: [resourcedetection, memory_limiter, batch]
          exporters: [prometheusremotewrite/cortex, debug]
        logs:
          receivers: [otlp]
          processors: [resourcedetection, memory_limiter, transform, batch]
          exporters: [otlp/opensearch, debug]
{{- end }}

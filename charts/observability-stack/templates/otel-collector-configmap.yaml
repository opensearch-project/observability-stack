{{- if index .Values "opentelemetry-collector" "enabled" }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
data:
  relay: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
            cors:
              allowed_origins:
                - "http://*"
                - "https://*"
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 10s
        send_batch_size: 1024
      resourcedetection:
        detectors: [env]
      transform:
        error_mode: ignore
        trace_statements:
          - context: span
            statements:
              - replace_pattern(name, "\\?.*", "")
              - set(attributes["error_type"], attributes["error.type"]) where attributes["error.type"] != nil
              - delete_key(attributes, "error.type")
        log_statements:
          - context: log
            statements:
              - flatten(body) where IsMap(body)
              - set(body, ToKeyValueString(body)) where IsMap(body)
    exporters:
      debug:
        verbosity: detailed
      otlp/opensearch:
        endpoint: "{{ .Release.Name }}-data-prepper:21890"
        tls:
          insecure: true
      otlphttp/prometheus:
        endpoint: "http://{{ .Release.Name }}-prometheus-server:80/api/v1/otlp"
        tls:
          insecure: true
    extensions:
      health_check:
        endpoint: ${env:MY_POD_IP}:13133
    service:
      extensions: [health_check]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: "0.0.0.0"
                    port: 8888
      pipelines:
        traces:
          receivers: [otlp]
          processors: [resourcedetection, memory_limiter, transform, batch]
          exporters: [otlp/opensearch, debug]
        metrics:
          receivers: [otlp]
          processors: [resourcedetection, memory_limiter, batch]
          exporters: [otlphttp/prometheus, debug]
        logs:
          receivers: [otlp]
          processors: [resourcedetection, memory_limiter, transform, batch]
          exporters: [otlp/opensearch, debug]
{{- end }}

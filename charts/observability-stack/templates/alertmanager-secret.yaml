{{- /*
Alertmanager config embeds OpenSearch credentials so it's rendered into
a Secret. Credentials are injected via sprig `replace` — the placeholder
tokens OPENSEARCH_USER / OPENSEARCH_PASSWORD and the compose hostname
`opensearch:9200` are swapped for chart-side values. `tpl` is avoided
because the alertmanager.yml body contains alertmanager's own Go-template
tokens that must NOT be evaluated by Helm.
*/ -}}
{{- if .Values.alertmanager.enabled }}
{{- $config := .Files.Get "files/alertmanager.yml" -}}
{{- $config = $config | replace "OPENSEARCH_USER" .Values.opensearchUsername -}}
{{- $config = $config | replace "OPENSEARCH_PASSWORD" .Values.opensearchPassword -}}
{{- $config = $config | replace "https://opensearch:9200" "https://opensearch-cluster-master:9200" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observability-stack.fullname" . }}-alertmanager-config
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
type: Opaque
stringData:
  alertmanager.yml: |
{{ $config | indent 4 }}
{{- end }}

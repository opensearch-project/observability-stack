{{- /*
Alertmanager config embeds OpenSearch credentials so it's rendered into
a Secret. Credentials are injected via sprig `replace` — the bracketed
placeholders {{OPENSEARCH_USER}} / {{OPENSEARCH_PASSWORD}} / {{OPENSEARCH_HOST}}
in files/alertmanager.yml are swapped for chart-side values. The braces
make the markers unambiguous, so future edits to alertmanager.yml that
mention OPENSEARCH_USER, etc. in comments are not silently replaced.
`tpl` is avoided because the alertmanager.yml body contains alertmanager's
own Go-template tokens that must NOT be evaluated by Helm.
*/ -}}
{{- if .Values.alertmanager.enabled }}
{{- $config := .Files.Get "files/alertmanager.yml" -}}
{{- $opensearchHost := printf "%s:9200" (.Values.opensearchServiceName | default "opensearch-cluster-master") -}}
{{- $config = $config | replace "{{OPENSEARCH_USER}}" .Values.opensearchUsername -}}
{{- $config = $config | replace "{{OPENSEARCH_PASSWORD}}" .Values.opensearchPassword -}}
{{- $config = $config | replace "{{OPENSEARCH_HOST}}" $opensearchHost -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "observability-stack.fullname" . }}-alertmanager-config
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: alertmanager
type: Opaque
stringData:
  alertmanager.yml: |
{{ $config | indent 4 }}
{{- end }}

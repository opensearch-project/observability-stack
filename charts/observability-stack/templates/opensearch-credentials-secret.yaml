apiVersion: v1
kind: Secret
metadata:
  name: opensearch-credentials
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.opensearchUsername | default "admin" | quote }}
  password: {{ .Values.opensearchPassword | quote }}
  cookie: {{ derivePassword 1 "long" .Values.opensearchPassword "opensearch-dashboards" "cookie" | quote }}
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: {{ .Values.opensearchPassword | quote }}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace "opensearch-credentials") }}
  {{- $existingKey := "" }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "datasource-encryption-key") }}
  {{- $existingKey = index $existingSecret.data "datasource-encryption-key" | b64dec }}
  {{- end }}
  datasource-encryption-key: {{ default (default (randAlphaNum 24) $existingKey) .Values.datasourceEncryptionKey | quote }}

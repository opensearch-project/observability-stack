{{- if and .Values.opensearch.enabled (index .Values "opentelemetry-demo" "enabled") }}
# Creates OpenSearch alerting monitors for the OTel demo application
# (checkout/payment/cart/frontend traces + logs). Only rendered when the
# otel-demo subchart is enabled.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "observability-stack.fullname" . }}-otel-demo-monitors-init-script
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "11"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  init-otel-demo-monitors.py: |
{{ .Files.Get "files/init-otel-demo-monitors.py" | indent 4 }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "observability-stack.fullname" . }}-otel-demo-monitors-init
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-demo-monitors-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: otel-demo-monitors-init
          image: python:3.11-alpine
          command:
            - /bin/sh
            - -c
            - |
              pip install -q requests && python /scripts/init-otel-demo-monitors.py
          env:
            - name: OPENSEARCH_URL
              value: "https://opensearch-cluster-master:9200"
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: {{ include "observability-stack.fullname" . }}-otel-demo-monitors-init-script
{{- end }}

{{- if index .Values "opensearch-dashboards" "enabled" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "observability-stack.fullname" . }}-init-dashboards
  labels:
    {{- include "observability-stack.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: init-dashboards
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init-dashboards
          image: python:3.12-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install -q requests pyyaml && python /scripts/init-opensearch-dashboards.py
          env:
            - name: OPENSEARCH_USER
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: username
            - name: OPENSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opensearch-credentials
                  key: password
            - name: BASE_URL
              value: "http://{{ .Release.Name }}-opensearch-dashboards:5601"
            - name: PROMETHEUS_HOST
              value: "{{ .Release.Name }}-prometheus-server"
            - name: PROMETHEUS_PORT
              value: "80"
            - name: OPENSEARCH_ENDPOINT
              value: "https://opensearch-cluster-master:9200"
            - name: ANONYMOUS_AUTH_ENABLED
              value: {{ ((.Values.anonymousAuth).enabled) | default false | quote }}
            - name: ISM_RETENTION_DAYS
              value: {{ .Values.ismRetentionDays | default 7 | quote }}
          volumeMounts:
            - name: init-script
              mountPath: /scripts
            - name: init-script
              mountPath: /config
      volumes:
        - name: init-script
          configMap:
            name: {{ include "observability-stack.fullname" . }}-init-script
{{- end }}

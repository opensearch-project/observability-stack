    curl -sk -u admin:'My_password_123!@#'
    -X POST https://localhost:9200/_plugins/_ppl
    -H 'Content-Type: application/json'
    -d '{"query": "source=logs-otel-v1-* | where body like '\''%error%'\'' | fields traceId, spanId, severityText, body, `resource.attributes.service.name`, `@timestamp` | sort - `@timestamp` | head 20"}'

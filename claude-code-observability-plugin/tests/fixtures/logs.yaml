  expected_fields:
    - schema
    - datarows
  tags:
    - logs

- name: body_search_match
  description: Full-text relevance search on log body using match function
  command: >-
    curl -sk -u admin:'My_password_123!@#'
    -X POST https://localhost:9200/_plugins/_ppl
    -H 'Content-Type: application/json'
    -d '{"query": "source=logs-otel-v1-* | where match(body, '\''failed'\'') | fields traceId, spanId, severityText, body, `resource.attributes.service.name`, `@timestamp` | sort - `@timestamp` | head 20"}'

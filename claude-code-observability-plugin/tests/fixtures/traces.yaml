- name: genai_agent_performance
  description: Compare GenAI agent performance by average duration and invocation count
  command: >-
    curl -sk -u admin:'My_password_123!@#'
    -X POST https://localhost:9200/_plugins/_ppl
    -H 'Content-Type: application/json'
    -d '{"query": "source=otel-v1-apm-span-* | where `attributes.gen_ai.operation.name` = '\''invoke_agent'\'' | stats count() as invocations, avg(durationInNanos) as avg_duration_ns by `attributes.gen_ai.agent.name` | sort - invocations"}'
  expected_status_code: 200
  expected_fields:
    - schema
    - datarows
  tags:
    - traces


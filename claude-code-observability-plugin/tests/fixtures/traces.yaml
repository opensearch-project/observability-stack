- name: token_usage_by_model
  description: Aggregate input and output token usage grouped by requested model
  command: >-
    curl -sk -u admin:'My_password_123!@#'
    -X POST https://localhost:9200/_plugins/_ppl
    -H 'Content-Type: application/json'
    -d '{"query": "source=otel-v1-apm-span-* | where `attributes.gen_ai.usage.input_tokens` > 0 | stats sum(`attributes.gen_ai.usage.input_tokens`) as total_input, sum(`attributes.gen_ai.usage.output_tokens`) as total_output by `attributes.gen_ai.request.model`"}'
  expected_status_code: 200
  expected_fields:
    - schema
    - datarows
  tags:
    - traces

- name: service_operations_list
  description: List distinct operations for each service to understand available endpoints
  command: >-
    curl -sk -u admin:'My_password_123!@#'
    -X POST https://localhost:9200/_plugins/_ppl
    -H 'Content-Type: application/json'
    -d '{"query": "source=otel-v1-apm-span-* | stats distinct_count(name) as operation_count, count() as span_count by serviceName | sort - span_count | head 20"}'
  expected_status_code: 200
  expected_fields:
    - schema
    - datarows
  tags:
    - traces


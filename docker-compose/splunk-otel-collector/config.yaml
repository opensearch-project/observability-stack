# Splunk OpenTelemetry Collector config for the side-by-side POC.
# See docker-compose/splunk-otel-collector/README.md to run.
#
# Based on Splunk's default agent_config.yaml with host-level receivers and
# smartagent/opamp/http_forwarder extensions removed (not viable in-container).
#
# Reference: https://github.com/signalfx/splunk-otel-collector/blob/main/cmd/otelcol/config/collector/agent_config.yaml

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

receivers:
  # OTLP on the same ports as the base collector so demo apps only need OTEL_COLLECTOR_HOST changed.
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    timeout: 10s
    send_batch_size: 1024

  resourcedetection:
    detectors: [env, system]

exporters:
  # Splunk APM: OTLP traces to Splunk's trace ingest endpoint.
  otlphttp/splunk-apm:
    traces_endpoint: "${SPLUNK_INGEST_URL}/v2/trace/otlp"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"

  # Splunk Infrastructure Monitoring: metrics + events.
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    api_url: "${SPLUNK_API_URL}"
    ingest_url: "${SPLUNK_INGEST_URL}"
    sync_host_metadata: true

  # Splunk Log Observer via HEC. Returns 404 in current POC validation; see README caveats.
  splunk_hec:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "${SPLUNK_HEC_URL}"
    source: "otel-demo"
    sourcetype: "otel"
    profiling_data_enabled: false

  # Forward to observability-stack's base otel-collector for the OpenSearch path.
  otlp/tee:
    endpoint: "otel-collector:4317"
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp/splunk-apm, signalfx, otlp/tee]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [signalfx, otlp/tee]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [splunk_hec, otlp/tee]

  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

# Splunk OpenTelemetry Collector — POC Configuration
#
# Acts as a tee: receives OTLP from demo apps, fans out to:
#   1. Splunk Observability Cloud (APM via otlphttp, IM via signalfx, Log Observer via splunk_hec)
#   2. observability-stack's base otel-collector (via OTLP forward), which continues the
#      existing Data Prepper / OpenSearch pipeline unchanged.
#
# Trimmed from Splunk's default agent_config.yaml:
#   - Host-level receivers (host_metrics, fluent_forward, smartagent/*) removed — not useful in container.
#   - Extensions that require host integration (smartagent bundle, opamp, http_forwarder) removed.
#   - Prometheus internal / entities pipelines removed — this is app-trace focused.
#
# References:
#   Splunk agent config: https://github.com/signalfx/splunk-otel-collector/blob/main/cmd/otelcol/config/collector/agent_config.yaml
#   signalfxexporter:   https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/exporter/signalfxexporter
#   splunkhecexporter:  https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/exporter/splunkhecexporter

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

receivers:
  # OTLP from demo apps (same shape as base otel-collector so apps' OTEL_EXPORTER_OTLP_ENDPOINT
  # only needs the hostname changed via OTEL_COLLECTOR_HOST override in .env.splunk-poc).
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    timeout: 10s
    send_batch_size: 1024

  resourcedetection:
    detectors: [env, system]

exporters:
  # ---- Splunk Observability Cloud ----
  # Splunk APM (traces) via OTLP HTTP to Splunk's trace ingest
  otlphttp/splunk-apm:
    traces_endpoint: "${SPLUNK_INGEST_URL}/v2/trace/otlp"
    headers:
      "X-SF-Token": "${SPLUNK_ACCESS_TOKEN}"

  # Splunk Infrastructure Monitoring (metrics + events)
  signalfx:
    access_token: "${SPLUNK_ACCESS_TOKEN}"
    api_url: "${SPLUNK_API_URL}"
    ingest_url: "${SPLUNK_INGEST_URL}"
    sync_host_metadata: true

  # Splunk Log Observer (logs). If SPLUNK_HEC_TOKEN is unset or invalid, the logs
  # pipeline will error but traces/metrics pipelines stay healthy.
  splunk_hec:
    token: "${SPLUNK_HEC_TOKEN}"
    endpoint: "${SPLUNK_HEC_URL}"
    source: "otel-demo"
    sourcetype: "otel"
    profiling_data_enabled: false

  # ---- Tee to observability-stack base collector (OpenSearch path) ----
  otlp/tee:
    endpoint: "otel-collector:4317"
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  extensions: [health_check]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [otlphttp/splunk-apm, signalfx, otlp/tee]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [signalfx, otlp/tee]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, batch]
      exporters: [splunk_hec, otlp/tee]

  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888

name: Deploy Docs to GitHub Pages

on:
  workflow_run:
    workflows: ["Docs CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    working-directory: ./docs

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Starlight dependencies
        run: npm ci
        working-directory: ./docs/starlight-docs

      - name: Detect fork base path
        id: base
        run: |
          if [ "${{ github.repository }}" != "opensearch-project/observability-stack" ]; then
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
            echo "path=/${REPO_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build main site
        run: npm run build:main
        env:
          ASTRO_BASE_PATH: ${{ steps.base.outputs.path }}

      - name: Build Starlight docs
        run: npm run build
        working-directory: ./docs/starlight-docs

      - name: Merge Starlight docs into main dist
        run: |
          mkdir -p dist/docs
          cp -r starlight-docs/dist/* dist/docs/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/dist

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
